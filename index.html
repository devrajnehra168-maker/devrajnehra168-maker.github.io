E html>
<html>
<head>
<title>CBSE Result</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: white;
}

/* Center Box */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Login Box */
.box {
    text-align: center;
}

/* Heading */
h1 {
    font-size: 18px;
    margin-bottom: 20px;
}

/* Inputs */
input {
    padding: 10px;
    margin: 10px;
    width: 250px;
    border: 1px solid #ccc;
}

/* Button */
button {
    padding: 10px 25px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

/* Loading Screen */
#loading {
    display: none;
    text-align: center;
    font-size: 20px;
}

/* Result Table */
#resultPage {
    display: none;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

td, th {
    border: 1px solid black;
    padding: 10px;
    text-align: center;
}
</style>

</head>

<body>

<!-- LOGIN PAGE -->
<div class="container" id="login">
    <div class="box">
        <h1>Senior School Certificate Examination (Class XII) Results 2026</h1>

        <input type="text" id="name" placeholder="Enter Name"><br>
        <input type="text" id="roll" placeholder="Enter Roll Number"><br>

        <button onclick="check()">Submit Result</button>
    </div>
</div>

<!-- LOADING -->
<div id="loading">
    <p>Loading Result...</p>
</div>

<!-- RESULT PAGE -->
<div id="resultPage">
    <h2>Result</h2>

    <table>
        <tr>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr><td>Physics</td><td>95</td></tr>
        <tr><td>Chemistry</td><td>93</td></tr>
        <tr><td>Biology</td><td>96</td></tr>
        <tr><td>English</td><td>90</td></tr>
        <tr><td>Physical Education</td><td>98</td></tr>
    </table>

    <h3>Total: 472 / 500</h3>
    <h3>Percentage: 94.4%</h3>

    <br><br>

    <img src="photo.jpg" style="width:100%; max-width:400px;">
</div>

<script>
function check() {
    var name = document.getElementById("name").value;
    var roll = document.getElementById("roll").value;

    if(name === "Devraj Nehra" && roll === "21682764") {
        
        document.getElementById("login").style.display = "none";
        document.getElementById("loading").style.display = "block";

        setTimeout(function() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("resultPage").style.display = "block";
        }, 2000);

    } else {
        alert("Invalid Details!");
    }
}
</script>

</body>
</html>
